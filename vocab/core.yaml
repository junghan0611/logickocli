# logickocli / vocab / core
#
# Canonical Korean logic vocabulary, normalized from Denote note 20230617T120300.
# Canonical = standard Korean academic term (한자말).
#
# `native_aliases` field holds native-Korean (한말) terms — primarily from
# 김명석 『두뇌보완계획100』, which deliberately reconstructs logic vocabulary
# in pure-Korean form. We keep those mappings to preserve search compatibility
# with older garden notes and to recognize user input written in that style.
# Responses use canonical_ko + symbol because those are best-attested in LLM
# pretraining distributions, which keeps human↔agent communication stable.
# That is a tool-choice, not a judgment about the vocabulary itself.
#
# ID scheme:
#   PROP.*    propositional logic (concepts, rules)
#   PRED.*    predicate / quantifier logic
#   META.*    metalogical concepts (validity, soundness, etc.)
#   SEM.*     sentences, terms, syntactic categories
#   RULE.*    derived inference/replacement rules
#   FALLACY.* — see vocab/fallacies.yaml

version: "1.0"
source:
  denote_id: "20230617T120300"
  source_rows: 141

