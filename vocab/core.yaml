    kind: inference_rule
    canonical_ko:
      - 보편 일반화
      - 보편양화사 도입
    en: [universal generalization, universal introduction]
    symbol: ["∀I", "UG"]
    schema:
      - "P(a) ⊢ ∀x P(x)   (a arbitrary)"
    native_aliases: ["모든 넣기"]

  - id: PRED.FORALL_ELIM
    domain: predicate_logic
    kind: inference_rule
    canonical_ko:
      - 보편 예화
      - 보편양화사 제거
    en: [universal instantiation, universal elimination]
    symbol: ["∀E", "UI"]
    schema:
      - "∀x P(x) ⊢ P(a)"
    native_aliases: ["모든 없애기"]

  - id: PRED.EXISTS_INTRO
    domain: predicate_logic
    kind: inference_rule
    canonical_ko:
      - 존재 일반화
      - 존재양화사 도입
    en: [existential generalization, existential introduction]
    symbol: ["∃I", "EG"]
    schema:
      - "P(a) ⊢ ∃x P(x)"
    native_aliases: ["몇몇 넣기"]

  - id: PRED.EXISTS_ELIM
    domain: predicate_logic
    kind: inference_rule
    canonical_ko:
      - 존재 예화
      - 존재양화사 제거
    en: [existential instantiation, existential elimination]
    symbol: ["∃E", "EI"]
    schema:
      - "∃x P(x), [P(a)] ⋯ C ⊢ C   (a fresh)"
    native_aliases: ["몇몇 없애기"]

  - id: PRED.QUANTIFIER_EXCHANGE_UNIV
    domain: predicate_logic
    kind: replacement_rule
    canonical_ko: 보편양화사 교환규칙
    en: [universal quantifier exchange]
    schema:
      - "¬∀x P(x) ≡ ∃x ¬P(x)"
    native_aliases: ["모든 몇몇 바꿈"]

  - id: PRED.QUANTIFIER_EXCHANGE_EXIST
    domain: predicate_logic
    kind: replacement_rule
    canonical_ko: 존재양화사 교환규칙
    en: [existential quantifier exchange]
    schema:
      - "¬∃x P(x) ≡ ∀x ¬P(x)"
    native_aliases: ["몇몇 모든 바꿈"]

  - id: PRED.CATEGORICAL_EQUIVALENCE
    domain: predicate_logic
