# =============================================================================
# Propositional logic — connectives
# =============================================================================

  - id: PROP.NEGATION
    domain: propositional_logic
    kind: connective
    canonical_ko: 부정
    en: [negation]
    symbol: ["¬", "~"]
    aliases_ko: []
    native_aliases: ["거짓이다", "거짓이다글월"]

  - id: PROP.CONJUNCTION
    domain: propositional_logic
    kind: connective
    canonical_ko: 연언
    en: [conjunction]
    symbol: ["∧", "&"]
    aliases_ko: []
    native_aliases: ["이고", "이고글월"]

  - id: PROP.DISJUNCTION
    domain: propositional_logic
    kind: connective
    canonical_ko: 선언
    en: [disjunction, inclusive disjunction]
    symbol: ["∨"]
    aliases_ko: [포괄 선언]
    native_aliases: ["이거나", "이거나글월", "넓은 이거나"]

  - id: PROP.EXCLUSIVE_DISJUNCTION
    domain: propositional_logic
    kind: connective
    canonical_ko: 배타 선언
    en: [exclusive disjunction]
    symbol: ["⊕"]
    aliases_ko: []
    native_aliases: ["좁은 이거나"]

  - id: PROP.CONDITIONAL
    domain: propositional_logic
    kind: connective
    canonical_ko: 조건문
    en: [conditional, material conditional]
    symbol: ["→", "⊃"]
    aliases_ko: [단순조건문]
    native_aliases: ["이면", "이면글월", "그냥 이면글월"]
    parts:
      antecedent:
        canonical_ko: 전건
        en: antecedent
        native_aliases: ["이면 앞말"]
      consequent:
        canonical_ko: 후건
        en: consequent

  - id: PROP.BICONDITIONAL
    domain: propositional_logic
    kind: connective
    canonical_ko: 쌍조건
    en: [biconditional]
    symbol: ["↔", "≡"]
    aliases_ko: []
    native_aliases: ["짝이면", "짝이면글월", "일 때 오직 그때만"]
    note: "if and only if / 인 경우 오직 그 경우에만"

  - id: PROP.DOUBLE_NEGATION
    domain: propositional_logic
    kind: concept
    canonical_ko: 이중부정
    en: [double negation]
    symbol: ["¬¬A"]
    native_aliases: ["두 번 거짓이다"]

# =============================================================================
# Propositional logic — natural deduction inference rules
# =============================================================================

  - id: PROP.CONJ_INTRO
    domain: propositional_logic
    kind: inference_rule
    canonical_ko:
      - 연언 도입
      - 연언논법
    en: [conjunction introduction, and introduction, conjunction rule]
    symbol: ["∧I"]
    schema:
      - "A, B ⊢ A ∧ B"
    native_aliases: ["이고 넣기"]

  - id: PROP.CONJ_ELIM
    domain: propositional_logic
    kind: inference_rule
    canonical_ko:
      - 연언 제거
      - 단순화논법
    en: [conjunction elimination, and elimination, simplification]
    symbol: ["∧E"]
    schema:
      - "A ∧ B ⊢ A"
      - "A ∧ B ⊢ B"
    native_aliases: ["이고 없애기"]

  - id: PROP.DISJ_INTRO
    domain: propositional_logic
    kind: inference_rule
    canonical_ko:
      - 선언 도입
      - 첨가논법
    en: [disjunction introduction, addition]
    symbol: ["∨I"]
    schema:
      - "A ⊢ A ∨ B"
    native_aliases: ["이거나 넣기"]

  - id: PROP.DISJ_ELIM
    domain: propositional_logic
    kind: inference_rule
    canonical_ko:
      - 선언 제거
      - 선언 삼단논법
    en: [disjunction elimination, disjunctive syllogism, case analysis]
    symbol: ["∨E"]
    schema:
      - "A ∨ B, ¬A ⊢ B"
      - "A ∨ B, A → C, B → C ⊢ C"
    native_aliases: ["이거나 없애기"]

  - id: PROP.ARGUMENT_BY_CASES
    domain: propositional_logic
    kind: inference_rule
    canonical_ko:
      - 경우에 의한 증명
      - 양도논법
    en: [argument by cases, proof by cases, constructive dilemma]
    symbol: []
    native_aliases: ["이러나저러나"]

  - id: PROP.IMP_INTRO
    domain: propositional_logic
    kind: inference_rule
    canonical_ko:
      - 조건문 도입
      - 조건증명법
    en: [conditional proof, implication introduction, conditional introduction]
    symbol: ["→I"]
    schema:
      - "[A] ⋯ B ⊢ A → B"
    native_aliases: ["이면 넣기"]

  - id: PROP.MODUS_PONENS
    domain: propositional_logic
    kind: inference_rule
    canonical_ko:
      - 전건긍정
      - 긍정논법
      - 조건문 제거
    en: [modus ponens, implication elimination]
    symbol: ["MP", "→E"]
    schema:
      - "A, A → B ⊢ B"
    native_aliases: ["이면 없애기"]

  - id: PROP.MODUS_TOLLENS
    domain: propositional_logic
    kind: inference_rule
    canonical_ko:
      - 후건부정
      - 부정논법
    en: [modus tollens, denying the consequent]
    symbol: ["MT"]
    schema:
      - "A → B, ¬B ⊢ ¬A"
    native_aliases: ["뒤로 이면 없애기"]

  - id: PROP.HYPOTHETICAL_SYLLOGISM
    domain: propositional_logic
    kind: inference_rule
    canonical_ko:
      - 가언 삼단논법
      - 연쇄논법
    en: [hypothetical syllogism, chain rule]
    symbol: ["HS"]
    schema:
      - "A → B, B → C ⊢ A → C"
    native_aliases: ["이면 잇기"]

  - id: PROP.RAA
    domain: propositional_logic
    kind: inference_rule
    canonical_ko:
      - 귀류법
      - 간접증명
      - 배리법
    en: [reductio ad absurdum, indirect proof, proof by contradiction]
    symbol: ["RAA", "¬I"]
    schema:
      - "[¬A] ⋯ ⊥ ⊢ A"
    native_aliases: ["거짓이다 넣기"]

  - id: PROP.DN_ELIM
    domain: propositional_logic
    kind: inference_rule
    canonical_ko: 이중부정 제거
    en: [double negation elimination]
    symbol: ["DNE", "¬¬E"]
    schema:
      - "¬¬A ⊢ A"
    native_aliases: ["거짓이다 없애기"]

# =============================================================================
# Propositional logic — replacement / equivalence rules
# =============================================================================

  - id: RULE.REPLACEMENT
    domain: propositional_logic
    kind: meta_rule
    canonical_ko: 치환규칙
    en: [replacement rule]
    native_aliases: ["달리 쓰기 굴레"]

  - id: RULE.EQUIVALENCE
    domain: propositional_logic
    kind: meta_rule
    canonical_ko: 동치규칙
    en: [equivalence rule]
    native_aliases: ["같은 말 굴레"]

  - id: RULE.DEMORGAN_CONJ
    domain: propositional_logic
    kind: replacement_rule
    canonical_ko: 연언 드 모르간 규칙
    en: ["De Morgan's rule of conjunction"]
    schema:
      - "¬(A ∧ B) ≡ ¬A ∨ ¬B"
    native_aliases: ["이고 모아 거짓이다"]

  - id: RULE.DEMORGAN_DISJ
    domain: propositional_logic
    kind: replacement_rule
    canonical_ko: 선언 드 모르간 규칙
    en: ["De Morgan's rule of disjunction"]
    schema:
      - "¬(A ∨ B) ≡ ¬A ∧ ¬B"
    native_aliases: ["이거나 모아 거짓이다"]

  - id: RULE.COMM_CONJ
    domain: propositional_logic
    kind: replacement_rule
    canonical_ko: 연언 교환규칙
    en: [commutativity of conjunction]
    schema:
      - "A ∧ B ≡ B ∧ A"
    native_aliases: ["이고 앞뒤 바꿈"]

  - id: RULE.COMM_DISJ
    domain: propositional_logic
    kind: replacement_rule
    canonical_ko: 선언 교환규칙
    en: [commutativity of disjunction]
    schema:
      - "A ∨ B ≡ B ∨ A"
    native_aliases: ["이거나 앞뒤 바꿈"]

  - id: RULE.ASSOC_CONJ
    domain: propositional_logic
    kind: replacement_rule
    canonical_ko: 연언 결합규칙
    en: [associativity of conjunction]
    schema:
      - "(A ∧ B) ∧ C ≡ A ∧ (B ∧ C)"
    native_aliases: ["이고 새로 모음"]

  - id: RULE.ASSOC_DISJ
    domain: propositional_logic
    kind: replacement_rule
    canonical_ko: 선언 결합규칙
    en: [associativity of disjunction]
    schema:
      - "(A ∨ B) ∨ C ≡ A ∨ (B ∨ C)"
    native_aliases: ["이거나 새로 모음"]

  - id: RULE.DIST_CONJ
    domain: propositional_logic
    kind: replacement_rule
    canonical_ko: 연언 배분규칙
    en: [distributivity of conjunction]
    schema:
      - "A ∧ (B ∨ C) ≡ (A ∧ B) ∨ (A ∧ C)"
    native_aliases: ["이고 나눔"]

  - id: RULE.DIST_DISJ
    domain: propositional_logic
    kind: replacement_rule
    canonical_ko: 선언 배분규칙
    en: [distributivity of disjunction]
    schema:
      - "A ∨ (B ∧ C) ≡ (A ∨ B) ∧ (A ∨ C)"
    native_aliases: ["이거나 나눔"]

  - id: RULE.TRANSPOSITION
    domain: propositional_logic
    kind: replacement_rule
    canonical_ko:
      - 대우규칙
      - 대우
    en: [transposition, contraposition]
    schema:
      - "A → B ≡ ¬B → ¬A"
    native_aliases: ["이면 앞뒤 바꿈"]

  - id: RULE.EXPORTATION
    domain: propositional_logic
    kind: replacement_rule
    canonical_ko: 추출규칙
    en: [exportation]
    schema:
      - "(A ∧ B) → C ≡ A → (B → C)"
    native_aliases: ["이렇고 저렇다면"]

  - id: RULE.CONDITIONAL_EXCHANGE
    domain: propositional_logic
    kind: replacement_rule
    canonical_ko: 조건규칙
    en: [conditional exchange, material implication]
    schema:
      - "A → B ≡ ¬A ∨ B"
    native_aliases: ["이면 이거나 바꿈"]

  - id: RULE.CONJ_TAUT
    domain: propositional_logic
    kind: replacement_rule
    canonical_ko: 연언 동어반복
    en: [conjunctive tautology, conjunction idempotence]
    schema:
      - "A ∧ A ≡ A"
    native_aliases: ["이고 되풀이"]

  - id: RULE.DISJ_TAUT
    domain: propositional_logic
    kind: replacement_rule
    canonical_ko: 선언 동어반복
    en: [disjunctive tautology, disjunction idempotence]
    schema:
      - "A ∨ A ≡ A"
    native_aliases: ["이거나 되풀이"]

