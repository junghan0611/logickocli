# Argument-analysis test cases — natural-language Korean argument → structured frame
#
# 자연어 논증을 받았을 때 기대되는 분석 결과. 응답이 정확히 이 형태일 필요는
# 없지만, expect_must_identify에 나열된 항목은 응답에 등장해야 한다.

version: "1.0"

cases:

  # 전건긍정 — 타당
  - input: "비가 오면 길이 젖는다. 비가 온다. 그러므로 길이 젖는다."
    expect_must_identify:
      - premises: ["비가 오면 길이 젖는다", "비가 온다"]
      - conclusion: "길이 젖는다"
      - formalization_shape: "A → B, A ⊢ B"
      - rule_id: PROP.MODUS_PONENS
      - validity: 타당
    expect_must_not_say:
      - "후건긍정"
      - "이면 없애기"  # native-Korean alias

  # 후건긍정의 오류 — 부당
  - input: "비가 오면 길이 젖는다. 길이 젖었다. 그러므로 비가 왔다."
    expect_must_identify:
      - premises: ["비가 오면 길이 젖는다", "길이 젖었다"]
      - conclusion: "비가 왔다"
      - formalization_shape: "A → B, B ⊢ A"
      - fallacy_id: FALLACY.AFFIRMING_CONSEQUENT
      - validity: 부당
      - counterexample_hint: ["스프링클러", "다른 원인"]
    expect_must_not_say:
      - "modus ponens"  # would be wrong
      - "잘못된 뒤로 이면 없애기"  # native-Korean alias

  # 후건부정 — 타당
  - input: "공부를 하면 시험을 잘 본다. 시험을 잘 못 봤다. 그러므로 공부를 안 했다."
    expect_must_identify:
      - formalization_shape: "A → B, ¬B ⊢ ¬A"
      - rule_id: PROP.MODUS_TOLLENS
      - validity: 타당
      - hidden_assumption_hint: "전건의 충분조건성 — 공부 외 다른 요인 무시"

  # 전건부정의 오류 — 부당
  - input: "공부를 하면 시험을 잘 본다. 공부를 안 했다. 그러므로 시험을 잘 못 본다."
    expect_must_identify:
      - formalization_shape: "A → B, ¬A ⊢ ¬B"
      - fallacy_id: FALLACY.DENYING_ANTECEDENT
      - validity: 부당

  # 가언 삼단논법
  - input: "운동을 하면 건강해진다. 건강해지면 행복하다. 그러므로 운동을 하면 행복하다."
    expect_must_identify:
      - formalization_shape: "A → B, B → C ⊢ A → C"
      - rule_id: PROP.HYPOTHETICAL_SYLLOGISM
      - validity: 타당

  # 선언 삼단논법
  - input: "민수는 사무실에 있거나 집에 있다. 민수는 사무실에 없다. 그러므로 민수는 집에 있다."
    expect_must_identify:
      - formalization_shape: "A ∨ B, ¬A ⊢ B"
      - rule_id: PROP.DISJ_ELIM
      - validity: 타당

  # 성급한 일반화
  - input: "내가 만난 한국인 두 명이 매운 음식을 좋아했다. 따라서 한국인은 모두 매운 음식을 좋아한다."
    expect_must_identify:
      - fallacy_id: FALLACY.HASTY_GENERALIZATION
      - inference_type: induction
      - weakness: "표본 크기 2명, 모집단 일반화 정당화 안 됨"

  # 후건 사후 — 사후 인과 오류
  - input: "내가 검은 옷을 입은 날 시험을 잘 봤다. 그러므로 검은 옷이 시험 성적을 올린다."
    expect_must_identify:
      - fallacy_id_any_of:
          - FALLACY.POST_HOC
          - FALLACY.CORRELATION_CAUSATION
      - inference_type: causation

  # 결론 선취
  - input: "이 책이 위대한 이유는 그 책이 위대한 작가가 썼기 때문이다. 그리고 작가가 위대한 이유는 그가 위대한 책을 썼기 때문이다."
    expect_must_identify:
      - fallacy_id: FALLACY.BEGGING_THE_QUESTION
      - reasoning_pattern: circular

  # 흑백논리
  - input: "너는 나와 함께가 아니면 나의 적이다."
    expect_must_identify:
      - fallacy_id: FALLACY.FALSE_DICHOTOMY
      - missing_options_hint: "중립, 무관, 부분적 동의 등"

  # 보편 예화
  - input: "모든 사람은 죽는다. 소크라테스는 사람이다. 그러므로 소크라테스는 죽는다."
    expect_must_identify:
      - rule_id_any_of:
          - PRED.FORALL_ELIM
          - SYLLOGISM
      - formalization_shape: "∀x (Man(x) → Mortal(x)), Man(socrates) ⊢ Mortal(socrates)"
      - validity: 타당

  # 양상 — T 공리
  - input: "필연적으로 A이면 A다."
    expect_must_identify:
      - modal_system: T
      - formula: "□A → A"
      - rule_id_hint: "T axiom"

  # 양상 — S4 공리
  - input: "필연적으로 A이면 필연적으로 필연적으로 A다."
    expect_must_identify:
      - modal_system: S4
      - formula: "□A → □□A"
      - rule_id_hint: "4 axiom"

  # 양상 — 가능성 정의
  - input: "A가 가능하다는 것은 A의 부정을 반드시 받아들이지 않아도 된다는 뜻이다."
    expect_must_identify:
      - definition: "◇A ≡ ¬□¬A"
      - caveat: "증명가능성 술어와 □를 동일시하기 전에 체계 확인 필요"
